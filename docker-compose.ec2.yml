# EC2 production Docker Compose — backend only.
# Database (RDS) and Redis (Upstash) are external managed services.
# Uses: docker-compose -f docker-compose.ec2.yml up -d
#
# For local development with a local Postgres + Redis, use docker-compose.yml instead.

version: "3.9"
services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
